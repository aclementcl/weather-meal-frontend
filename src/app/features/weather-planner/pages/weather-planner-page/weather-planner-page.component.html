<main class="app-shell">
  <section class="workspace" aria-labelledby="app-title">
    <div class="intro">
      <p class="eyebrow">WeatherMeal</p>
      <h1 id="app-title">Planifica tu menú según el clima en Chile</h1>
      <p>
        Usamos tu ubicación para sugerir la ciudad soportada más cercana. Puedes cambiarla cuando quieras.
      </p>
    </div>

    <section class="planner-panel" aria-label="Planificador">
      <div class="planner-header">
        <span class="section-label">Plan</span>
        <h2>Datos del día</h2>
      </div>

      <div class="planner-fields">
        <app-location-selector
          [regions]="regions()"
          [locations]="locations()"
          [selectedRegionId]="selectedRegionId()"
          [selectedCityId]="selectedCityId()"
          [isLoading]="isLoadingLocations()"
          [errorMessage]="locationError()"
          (selectedRegionChange)="onRegionChange($event)"
          (selectedCityChange)="onCityChange($event)"
        />

        <app-date-selector
          [selectedDate]="selectedDate()"
          [minDate]="minDate"
          [maxDate]="maxDate"
          (selectedDateChange)="onDateChange($event)"
        />
      </div>

      <app-preferences-selector
        [options]="preferenceOptions"
        [selectedPreferenceIds]="selectedPreferenceIds()"
        (selectedPreferenceIdsChange)="onPreferencesChange($event)"
      />
    </section>

    <app-weather-summary
      [weather]="weather()"
      [isLoading]="isLoadingWeather()"
      [errorMessage]="weatherError()"
    />

    <app-menu-suggestion
      [menuSuggestion]="menuSuggestion()"
      [isLoading]="isLoadingMenu()"
      [errorMessage]="menuError()"
      [canRequest]="canRequestMenu()"
      (requestMenu)="suggestMenu()"
    />
  </section>
</main>
