<section class="date-panel" aria-label="Fecha del pronostico">
  <label for="forecast-date">Fecha del pronostico</label>
  <input
    id="forecast-date"
    type="date"
    [value]="selectedDate()"
    [min]="minDate()"
    [max]="maxDate()"
    (change)="onDateInput($any($event.target).value)"
  />
</section>
