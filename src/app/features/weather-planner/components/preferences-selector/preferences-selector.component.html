<section class="preferences-panel" aria-label="Preferencias alimenticias">
  <span class="section-label">Preferencias opcionales</span>

  <div class="options" aria-label="Preferencias alimenticias">
    @for (option of options(); track option.id) {
      <label>
        <input
          type="checkbox"
          [checked]="isSelected(option.id)"
          (change)="togglePreference(option.id, $any($event.target).checked)"
        />
        <span>{{ option.label }}</span>
      </label>
    }
  </div>
</section>
