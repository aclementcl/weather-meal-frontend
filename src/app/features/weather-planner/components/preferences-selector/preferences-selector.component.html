<section class="preferences-panel" aria-labelledby="preferences-title">
  <div>
    <span class="section-label">Preferencias</span>
    <h2 id="preferences-title">Opcionales</h2>
  </div>

  <div class="options" aria-label="Preferencias alimenticias">
    @for (option of options(); track option.value) {
      <label>
        <input
          type="checkbox"
          [checked]="isSelected(option.value)"
          (change)="togglePreference(option.value, $any($event.target).checked)"
        />
        <span>{{ option.label }}</span>
      </label>
    }
  </div>
</section>
