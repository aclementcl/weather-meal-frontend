services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weathermeal-frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://host.docker.internal:3000}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
