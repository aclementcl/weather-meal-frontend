name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build -- --progress=false

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment settings
        run: |
          echo "DEPLOY_PORT=${{ vars.DROPLET_PORT }}" >> "$GITHUB_ENV"
          echo "DEPLOY_PATH=${{ vars.DEPLOY_PATH }}" >> "$GITHUB_ENV"

      - name: Apply default deployment settings
        run: |
          if [ -z "${DEPLOY_PORT:-}" ]; then
            echo "DEPLOY_PORT=22" >> "$GITHUB_ENV"
          fi

          if [ -z "${DEPLOY_PATH:-}" ]; then
            echo "DEPLOY_PATH=/opt/weathermeal/frontend" >> "$GITHUB_ENV"
          fi

      - name: Configure SSH
        env:
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DROPLET_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DROPLET_HOST" >> ~/.ssh/known_hosts

      - name: Create remote deploy directory
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          ssh -p "$DEPLOY_PORT" "$DROPLET_USER@$DROPLET_HOST" "mkdir -p '$DEPLOY_PATH'"

      - name: Sync repository to Droplet
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'coverage' \
            --exclude '.env' \
            ./ "$DROPLET_USER@$DROPLET_HOST:$DEPLOY_PATH/"

      - name: Run remote deployment
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          ssh -p "$DEPLOY_PORT" "$DROPLET_USER@$DROPLET_HOST" \
            "chmod +x '$DEPLOY_PATH/scripts/deploy.sh' && '$DEPLOY_PATH/scripts/deploy.sh' '$DEPLOY_PATH'"
